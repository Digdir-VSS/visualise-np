<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
    
    #spinner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: #6b7280;
      font-size: 14px;
    }

    .spin {
      width: 36px;
      height: 36px;
      border: 3px solid #e5e7eb;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #chart { display: none; width: 100% !important; }
  </style>
</head>
<body>
  <div id="spinner">
    <div class="spin"></div>
    <span>Laster data...</span>
  </div>
  <canvas id="chart"></canvas>

  <script>
    async function render() {
      try {
        const response = await fetch('/api/tiltak-per-kommune');
        const data = await response.json();
        if (!response.ok){
          const err = await response.json();
          throw new Error(err.detail());
        }
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('chart').style.display = 'block';

        new Chart(document.getElementById('chart'), {
          type: data.type,
          data: { labels: data.labels, datasets: data.datasets },
          options: { responsive: true }
        });
      } catch (e) {
        document.getElementById('spinner').innerHTML = `${e.message}`;
      }
    }
    render();
  </script>
</body>
</html>
